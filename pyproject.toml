[project]
name = "cbed-simulation"
version = "0.1.0"
description = "Generate CBED patterns from crystal definition and orientation"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Matthew Bryan", email = "matthew.bryan@cea.fr" }
]
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scikit-image",
    "scipy",
    "orix",
    "abtem",
    "ase",
    "diffsims",
    "diffpy.structure",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
